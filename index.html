<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Cita</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
    }
    
    .logo-container {
      margin-top: 50px;
      margin-bottom: 30px;
    }
    
    .form-container {
      background-color: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
      padding: 30px;
      margin-bottom: 50px;
    }

    .form-control, .form-select {
      background-color: #2a2a2a;
      border: 1px solid #333;
      color: white;
    }

    .form-control:focus, .form-select:focus {
      background-color: #2a2a2a;
      border-color: #4d4d4d;
      color: white;
      box-shadow: 0 0 0 0.25rem rgba(255,255,255,0.25);
    }

    .form-control::placeholder {
      color: #999;
    }

    .form-select {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
    }

    .form-select option {
      background-color: #2a2a2a;
      color: white;
    }

    .form-label {
      color: #ffffff;
    }

    .text-muted {
      color: #cccccc !important;
    }

    .btn-submit {
      background-color: #05642d;
      color: #fff;
      padding: 10px 30px;
      border: none;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      background-color: #cccccc;
      color: #000000;
      transform: translateY(-2px);
    }

    .confirmation-message {
      color: #00ff00;
    }

    .hidden {
      display: none;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-12 text-center logo-container">
        <img alt="Logo" src="logo2.png" class="img-fluid" height="350px" width="350px">
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="form-container">
          <h1 class="text-center mb-2">Agendar Cita</h1>
          <form id="contact-form">
            <div class="mb-3">
              <label for="name" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="name" placeholder="Ingrese el nombre del paciente" required>
            </div>
            <div class="mb-3">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="telefono" class="form-control" id="telefono" placeholder="Ingrese el teléfono del paciente" required>
            </div>

            <div class="mb-3">
              <label for="district" class="form-label">Servicio</label>
              <select class="form-select" id="district" required>
                <option value="">Seleccione un Servicio a Agendar</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">Dirección</label>
              <input type="text" class="form-control" id="address" 
                     placeholder="Ingrese la direccion del paciente" required>
            </div>

            <div class="mb-3">
              <label for="date" class="form-label">Fecha</label>
              <input type="date" class="form-control" id="date" required>
            </div>

            <div class="mb-3">
              <label for="time" class="form-label">Hora</label>
              <select class="form-select" id="time" required>
              </select>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-submit btn-lg">
                Agendar Cita
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle con Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
